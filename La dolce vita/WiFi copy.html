<style>
  .container {
    position: relative;
    width: 100%;
    height: 400px;
    overflow: hidden;
  }

  .content, .new-content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transition: transform 0.6s ease;
  }

  .content {
    background: lightblue;
  }

  .new-content {
    background: lightgray;
    transform: translateX(100%); /* inizialmente fuori */
  }

  .slide-btn {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    padding: 10px 20px;
    background: #0078d7;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
  }
</style>

<div class="container">
  <div id="currentDiv" class="content">
    <h2>Div Attuale</h2>
  </div>
  <div id="newDiv" class="new-content">
    <h2>Nuovo Div Vuoto</h2>
  </div>
  <button class="slide-btn" onclick="slideDiv()">➡</button>
</div>

<script>
  let toggled = false;

  function slideDiv() {
    const current = document.getElementById("currentDiv");
    const newDiv = document.getElementById("newDiv");

    if (!toggled) {
      // Primo click: sposta fuori il div attuale e porta dentro il nuovo
      current.style.transform = "translateX(100%)";
      newDiv.style.transform = "translateX(0)";
      toggled = true;
    } else {
      // Secondo click: riporta indietro il div attuale e nasconde il nuovo
      current.style.transform = "translateX(0)";
      newDiv.style.transform = "translateX(100%)";
      toggled = false;
    }
  }
</script>
